<div class="app-shell" *ngIf="isLoggedIn">
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header" style="justify-content: center; padding: 1rem 0;">
      <img *ngIf="companyLogo" [src]="companyLogo" style="height:48px;width:100%;max-width:120px;object-fit:contain;flex-shrink:0">
      <i *ngIf="!companyLogo" class="bi bi-building logo-icon" style="font-size: 2rem;"></i>
    </div>
    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         class="nav-item"
         [routerLink]="item.path"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: item.path === '/dashboard'}">
        <i class="bi {{ item.icon }}"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="nav-item" (click)="logout()" style="cursor:pointer">
        <i class="bi bi-box-arrow-right"></i>
        <span class="nav-label">Logout</span>
      </div>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn btn-soft btn-sm sidebar-toggle" (click)="sidebarCollapsed = !sidebarCollapsed">
          <i class="bi bi-list"></i>
        </button>
        <div class="search-box" style="position: relative;">
          <i class="bi bi-search"></i>
          <input type="text" class="form-control form-control-sm" placeholder="Search employees..." [(ngModel)]="searchQuery" (input)="onSearch()">
          
          <div *ngIf="searchResults && searchResults.length > 0" class="search-results-dropdown shadow" style="position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 4px; z-index: 1000; margin-top: 4px; max-height: 300px; overflow-y: auto;">
            <div *ngFor="let s of searchResults" class="search-item p-2" style="cursor: pointer; border-bottom: 1px solid var(--border-color);" (click)="selectSearchResult(s)">
              <div class="fw-medium">{{ s.name }}</div>
              <div class="text-muted" style="font-size: 0.75rem;">{{ s.emp_code }} - {{ s.designation || 'No Designation' }}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user-avatar">
          <span>{{ userName.charAt(0).toUpperCase() }}</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</div>

<div *ngIf="!isLoggedIn" class="auth-shell">
  <router-outlet />
</div>
